<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propositions & Commentaires</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      margin: 0;
      color: #333;
      font-size: 1.8rem;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
    }
    .btn-retour {
      background: #666;
      color: white;
    }
    .main-content {
      display: flex;
      gap: 20px;
    }
    .sidebar {
      width: 250px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      height: fit-content;
    }
    .sidebar h3 {
      margin-top: 0;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .user-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .user-list li {
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .user-list li:hover {
      background: #f0f0f0;
    }
    .user-list li.active {
      background: #667eea;
      color: white;
    }
    .user-name {
      font-weight: 600;
    }
    .user-situation {
      font-size: 0.8em;
      color: #666;
    }
    .user-list li.active .user-situation {
      color: white;
    }
    .comments-section {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .comments-section h2 {
      margin-top: 0;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .comment-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0;
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .comment-author {
      font-weight: 600;
      color: #333;
    }
    .comment-situation {
      background: #667eea;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.8em;
    }
    .comment-date {
      font-size: 0.8em;
      color: #999;
    }
    .comment-message {
      color: #555;
      line-height: 1.6;
    }
    .admin-buttons {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    .btn-admin-action {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
    }
    .btn-reply {
      background: #2196F3;
      color: white;
    }
    .btn-delete {
      background: #f44336;
      color: white;
    }
    .reply-section {
      margin-top: 15px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 6px;
      border-left: 3px solid #2196F3;
    }
    .reply-label {
      font-weight: 600;
      color: #1976d2;
      font-size: 0.9em;
    }
    .reply-text {
      color: #333;
      margin-top: 5px;
    }
    .reply-form {
      margin-top: 10px;
    }
    .reply-form textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-height: 80px;
      font-family: inherit;
    }
    .reply-form button {
      margin-top: 8px;
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .reply-form button.cancel {
      background: #999;
      margin-left: 10px;
    }
    .no-comments {
      text-align: center;
      color: #999;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-comments"></i> Propositions & Commentaires</h1>
      <div>
        <a href="ajout.html" class="btn btn-primary">
          <i class="fas fa-plus"></i> Nouvelle Proposition
        </a>
        <a href="../index.html" class="btn btn-retour" style="margin-left: 10px;">
          <i class="fas fa-home"></i> Retour
        </a>
      </div>
    </div>
    
    <div class="main-content">
      <div class="sidebar">
        <h3><i class="fas fa-users"></i> Utilisateurs</h3>
        <ul class="user-list" id="user-list">
          <li class="active" data-id="all">Tous les commentaires</li>
        </ul>
      </div>
      
      <div class="comments-section">
        <h2><i class="fas fa-list"></i> Liste des Commentaires</h2>
        <div id="comments-container">
          <div class="no-comments">Chargement des commentaires...</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let allCommentaires = [];
    let selectedUser = 'all';
    
    // Charger les commentaires au démarrage
    async function chargerCommentaires() {
      try {
        const response = await fetch('/api/commentaires');
        const result = await response.json();
        
        if (result.success && result.commentaires) {
          allCommentaires = result.commentaires;
          afficherUtilisateurs();
          afficherCommentaires();
        } else {
          document.getElementById('comments-container').innerHTML = `
            <div class="no-comments">Aucun commentaire pour le moment</div>
          `;
        }
      } catch (e) {
        console.error(e);
        document.getElementById('comments-container').innerHTML = `
          <div class="no-comments">Erreur de chargement</div>
        `;
      }
    }
    
    function afficherUtilisateurs() {
      const userList = document.getElementById('user-list');
      
      // Regrouper les utilisateurs uniques
      const utilisateurs = {};
      allCommentaires.forEach(c => {
        if (!utilisateurs[c.nom]) {
          utilisateurs[c.nom] = c.situation;
        }
      });
      
      let html = '<li class="active" data-id="all" onclick="filterUser(\'all\')">Tous les commentaires</li>';
      
      Object.keys(utilisateurs).forEach(nom => {
        html += `
          <li data-id="${nom}" onclick="filterUser('${nom}')">
            <div class="user-name">${nom}</div>
            <div class="user-situation">${utilisateurs[nom]}</div>
          </li>
        `;
      });
      
      userList.innerHTML = html;
    }
    
    function filterUser(userId) {
      selectedUser = userId;
      
      // Mettre à jour la classe active
      document.querySelectorAll('.user-list li').forEach(li => {
        li.classList.remove('active');
        if (li.dataset.id === userId) {
          li.classList.add('active');
        }
      });
      
      afficherCommentaires();
    }
    
    function afficherCommentaires() {
      const container = document.getElementById('comments-container');
      
      let filtered = allCommentaires;
      if (selectedUser !== 'all') {
        filtered = allCommentaires.filter(c => c.nom === selectedUser);
      }
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-comments">Aucun commentaire</div>';
        return;
      }
      
      const isAdmin = sessionStorage.getItem('adminPassword') !== null;
      
      let html = '';
      filtered.forEach(c => {
        const date = new Date(c.created_at).toLocaleDateString('fr-FR', {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
        
        // Afficher la réponse de l'admin si elle existe
        let replyHTML = '';
        if (c.reponse_admin) {
          replyHTML = `
            <div class="reply-section">
              <div class="reply-label">✉ Réponse de l'admin:</div>
              <div class="reply-text">${c.reponse_admin}</div>
            </div>
          `;
        }
        
        // Boutons admin (Répondre et Supprimer)
        let adminButtons = '';
        if (isAdmin) {
          adminButtons = `
            <div class="admin-buttons">
              <button class="btn-admin-action btn-reply" onclick="showReplyForm('${c.id}')">
                <i class="fas fa-reply"></i> Répondre
              </button>
              <button class="btn-admin-action btn-delete" onclick="deleteComment('${c.id}')">
                <i class="fas fa-trash"></i> Supprimer
              </button>
            </div>
            <div id="reply-form-${c.id}" class="reply-form" style="display:none;">
              <textarea id="reply-text-${c.id}" placeholder="Votre réponse..."></textarea>
              <button onclick="submitReply('${c.id}')">Envoyer la réponse</button>
              <button class="cancel" onclick="hideReplyForm('${c.id}')">Annuler</button>
            </div>
          `;
        }
        
        html += `
          <div class="comment-card" id="comment-${c.id}">
            <div class="comment-header">
              <div>
                <span class="comment-author">${c.nom}</span>
                <span class="comment-situation">${c.situation}</span>
              </div>
              <span class="comment-date">${date}</span>
            </div>
            <div class="comment-message">${c.message}</div>
            ${replyHTML}
            ${adminButtons}
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    function showReplyForm(commentId) {
      document.getElementById(`reply-form-${commentId}`).style.display = 'block';
    }
    
    function hideReplyForm(commentId) {
      document.getElementById(`reply-form-${commentId}`).style.display = 'none';
      document.getElementById(`reply-text-${commentId}`).value = '';
    }
    
    async function submitReply(commentId) {
      const replyText = document.getElementById(`reply-text-${commentId}`).value.trim();
      if (!replyText) {
        alert('Veuillez entrer une réponse');
        return;
      }
      
      const adminPassword = sessionStorage.getItem('adminPassword');
      if (!adminPassword) {
        alert('Session expirée');
        return;
      }
      
      try {
        const response = await fetch('/api/commentaires', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'reply',
            password: adminPassword,
            commentId: commentId,
            reponse: replyText
          })
        });
        
        const result = await response.json();
        if (result.success) {
          alert('Réponse enregistrée!');
          chargerCommentaires();
        } else {
          alert('Erreur: ' + result.message);
        }
      } catch (e) {
        alert('Erreur');
      }
    }
    
    async function deleteComment(commentId) {
      if (!confirm('Voulez-vous vraiment supprimer ce commentaire?')) return;
      
      const adminPassword = sessionStorage.getItem('adminPassword');
      if (!adminPassword) {
        alert('Session expirée');
        return;
      }
      
      try {
        const response = await fetch('/api/commentaires', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'delete',
            password: adminPassword,
            commentId: commentId
          })
        });
        
        const result = await response.json();
        if (result.success) {
          alert('Commentaire supprimé!');
          chargerCommentaires();
        } else {
          alert('Erreur: ' + result.message);
        }
      } catch (e) {
        alert('Erreur');
      }
    }
    
    // Charger au démarrage
    chargerCommentaires();
  </script>
</body>
</html>
